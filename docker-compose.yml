# Society Maintenance Tracker — Docker Compose
#
# Purpose: Spins up a local PostgreSQL database for development.
# The Express server is run directly via `npm run dev` for hot-reloading.
#
# Usage:
#   docker compose up -d        — Start the database
#   docker compose down         — Stop the database
#   docker compose down -v      — Stop and delete all data

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: society_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-society_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-society_password}
      POSTGRES_DB: ${POSTGRES_DB:-society_maintenance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-society_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
